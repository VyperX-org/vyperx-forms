<!DOCTYPE html>
<!-- saved from url=(0038)https://vyperx-forms.netlify.app/tasha -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VyperX Growth Form</title>

  <style>
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    body {
      background-color: #0c0f14;
    }

    .card {
      width: 100%; max-width: 100vw; padding: 28px; border-radius: 20px;
      background: linear-gradient(145deg, #12151c, #0c0f14);
      border: 1px solid rgba(120, 120, 255, 0.2);
      box-shadow: 0 0 40px rgba(100, 100, 255, 0.1);
    }

    h2 { margin: 0 0 10px; font-weight: 600; color: #9b9cff; }
    p { font-size: 14px; color: #aaa; margin-bottom: 20px; }

    .input {
      width: 100%; margin-bottom: 15px; display: flex; align-items: center;
      background: #0f131a; border: 1px solid #1e2330; border-radius: 12px; padding: 12px;
    }

    .input input, .input select {
      border: none; outline: none; background: transparent; color: #fff;
      font-size: 14px; width: 100%;
    }

    .input select { width: 90px; margin-right: 10px; color: #ccc; }

    button {
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      background: linear-gradient(90deg, #7b7dff, #6a6cff);
      color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s;
    }

    button:hover { opacity: 0.9; }

    .success { display: none; text-align: center; }

    .success .icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(120,120,255,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 15px; font-size: 28px;
    }

    .small { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
  </style>
</head>

<body>

  <div class="card">

    <form id="form" method="POST" name="Tasha-Form">

      <input type="hidden" name="form-name" value="Tasha-Form">

      <!-- Honeypot -->
      <input type="text" name="bot-field" style="display:none">

      <div id="form-ui">
        <h2>Scale with VyperX</h2>
        <p>Tasha will share your details with our strategists to build your custom growth plan.</p>

        <div class="input">
          <input type="text" name="name" placeholder="Full Name" required="">
        </div>

        <div class="input">
          <input type="email" name="email" placeholder="Email Address" required="">
        </div>

        <div class="input">
          <select name="country_code" required="">
            <option value="+91">🇮🇳 +91</option>
            <option value="+1">🇺🇸 +1</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+61">🇦🇺 +61</option>
            <option value="+81">🇯🇵 +81</option>
          </select>

          <input id="phone" type="tel" name="phone" placeholder="Phone Number (WhatsApp preferred)" required="">
        </div>

        <button type="submit">Boost My Brand Growth</button>

        <div class="small">
          By submitting, you agree to VyperX's scaling terms.
        </div>
      </div>

      <div class="success" id="success-ui">
        <div class="icon">✓</div>
        <h2>Strategy Call Scheduled!</h2>
        <p>The VyperX growth team has been notified. We'll be in touch soon!</p>
      </div>

    </form>
  </div>

  <script>
    const form = document.getElementById("form");
    const formUI = document.getElementById("form-ui");
    const successUI = document.getElementById("success-ui");
    const phoneInput = document.getElementById("phone");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      // Phone validation (at least 10 digits)
      const phoneValue = phoneInput.value.replace(/\D/g, "");

      if (phoneValue.length < 10) {
        alert("Enter a valid phone number (at least 10 digits)");
        return;
      }

      const data = new FormData(form);

      fetch("/", {
        method: "POST",
        body: data
      })
      .then(() => {
        formUI.style.display = "none";
        successUI.style.display = "block";
      })
      .catch(() => alert("Submission failed. Try again."));
    });
  </script>



</body></html>
